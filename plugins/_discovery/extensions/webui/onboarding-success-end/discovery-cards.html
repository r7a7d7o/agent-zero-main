<script type="module">
    import { store } from "/plugins/_discovery/webui/discovery-store.js";
</script>

<div x-data>
    <template x-if="$store.discoveryStore">
        <div class="discovery-slot"
             @modal-closed.window="$store.discoveryStore.refreshCards()"
             x-create="$store.discoveryStore.refreshCards()"
             x-show="$store.discoveryStore.cards.length > 0 || $store.discoveryStore.hasDismissedCards">

            <div class="discovery-section">

                <div class="discovery-features" x-show="$store.discoveryStore.featureCards.length > 0" style="text-align: left;">
                    <template x-for="card in $store.discoveryStore.featureCards" :key="card.id">
                        <article class="discovery-feature-card"
                                 role="button"
                                 tabindex="0"
                                 @click="$store.discoveryStore.executeCta(card.cta_action)"
                                 @keydown.enter.prevent="$store.discoveryStore.executeCta(card.cta_action)"
                                 @keydown.space.prevent="$store.discoveryStore.executeCta(card.cta_action)">
                            <button class="discovery-dismiss discovery-dismiss-small"
                                    type="button"
                                    x-show="card.dismissible"
                                    @click.stop="$store.discoveryStore.dismissCard(card.id)"
                                    :aria-label="`Dismiss ${card.title}`"
                                    title="Dismiss">
                                <span class="material-symbols-outlined">close</span>
                            </button>

                            <div class="discovery-feature-head">
                                <div class="discovery-feature-thumb">
                                    <template x-if="card.thumbnail">
                                        <img :src="card.thumbnail" :alt="card.title" loading="lazy">
                                    </template>
                                    <template x-if="!card.thumbnail && card.icon">
                                        <span class="material-symbols-outlined discovery-feature-icon" x-text="card.icon"></span>
                                    </template>
                                </div>
                                <h4 class="discovery-feature-title" x-text="card.title"></h4>
                            </div>

                            <p class="discovery-feature-desc" x-text="card.description"></p>

                            <button class="btn btn primary"
                                    type="button"
                                    @click.stop="$store.discoveryStore.executeCta(card.cta_action)">
                                <span x-text="card.cta_text"></span>
                                <span class="material-symbols-outlined">arrow_forward</span>
                            </button>
                        </article>
                    </template>
                </div>


                <template x-for="card in $store.discoveryStore.heroCards.filter(card => card.id !== 'discovery-codex-oauth')" :key="card.id">
                    <article class="discovery-hero"
                             role="button"
                             tabindex="0"
                             @click="$store.discoveryStore.executeCta(card.cta_action)"
                             @keydown.enter.prevent="$store.discoveryStore.executeCta(card.cta_action)"
                             @keydown.space.prevent="$store.discoveryStore.executeCta(card.cta_action)">
                        <button class="discovery-dismiss"
                                type="button"
                                x-show="card.dismissible"
                                @click.stop="$store.discoveryStore.dismissCard(card.id)"
                                :aria-label="`Dismiss ${card.title}`"
                                title="Dismiss">
                            <span class="material-symbols-outlined">close</span>
                        </button>

                        <div class="discovery-hero-content">
                            <h3 class="discovery-hero-title" x-text="card.title"></h3>
                            <p class="discovery-hero-desc" x-text="card.description"></p>
                            <button class="btn btn-ok"
                                    type="button"
                                    @click.stop="$store.discoveryStore.executeCta(card.cta_action)">
                                <span x-text="card.cta_text"></span>
                                <span class="material-symbols-outlined">arrow_forward</span>
                            </button>
                        </div>

                        <div class="discovery-hero-thumb">
                            <template x-if="card.thumbnail">
                                <img :src="card.thumbnail" :alt="card.title" loading="lazy">
                            </template>
                            <template x-if="!card.thumbnail && card.icon">
                                <span class="material-symbols-outlined discovery-hero-icon" x-text="card.icon"></span>
                            </template>
                        </div>
                    </article>
                </template>

                <article class="discovery-cli-card" aria-labelledby="discovery-cli-title">
                    <div class="discovery-cli-content">
                        <span class="discovery-cli-kicker">CLI Connector</span>
                        <h3 class="discovery-cli-title" id="discovery-cli-title">Connect Agent Zero to your desktop</h3>
                        <p class="discovery-cli-desc">
                            Install the CLI Connector when you want A0 to use your host terminal,
                            local files, and a browser from your computer.
                        </p>
                        <div class="discovery-cli-commands" aria-label="CLI Connector install commands">
                            <div class="discovery-cli-command">
                                <span class="discovery-cli-label">macOS / Linux</span>
                                <code>curl -LsSf https://cli.agent-zero.ai/install.sh | sh</code>
                            </div>
                            <div class="discovery-cli-command">
                                <span class="discovery-cli-label">Windows PowerShell</span>
                                <code>irm https://cli.agent-zero.ai/install.ps1 | iex</code>
                            </div>
                        </div>
                    </div>

                    <figure class="discovery-cli-preview" aria-label="Agent Zero CLI Connector preview">
                        <img src="/plugins/_discovery/webui/assets/cli-connector-preview.png"
                             alt="Agent Zero CLI Connector terminal preview"
                             loading="lazy">
                    </figure>
                </article>

                <div class="discovery-undismiss" x-show="$store.discoveryStore.hasDismissedCards">
                    <button type="button"
                            class="discovery-undismiss-btn"
                            @click="$store.discoveryStore.undismissCards()">
                        <span class="material-symbols-outlined">undo</span>
                        <span>Show dismissed suggestions</span>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <style>
        .discovery-slot {
            grid-column: 1 / -1;
            width: 100%;
        }

        .discovery-section {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            width: 100%;
            margin-top: 0.85rem;
        }

        .discovery-hero,
        .discovery-feature-card,
        .discovery-cli-card {
            position: relative;
            border: 1px solid var(--color-border);
            border-radius: 10px;
            background: var(--color-panel);
            text-align: left;
            transition:
                border-color 0.2s ease,
                background-color 0.2s ease,
                box-shadow 0.2s ease,
                transform 0.2s ease;
        }

        .discovery-hero:hover,
        .discovery-feature-card:hover,
        .discovery-cli-card:hover,
        .discovery-hero:focus-visible,
        .discovery-feature-card:focus-visible,
        .discovery-cli-card:focus-visible {
            border-color: color-mix(in srgb, var(--color-primary) 72%, white 6%);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.16);
            outline: none;
        }

        .discovery-hero {
            display: flex;
            align-items: center;
            gap: 1rem;
            min-height: 126px;
            overflow: hidden;
            padding: 1rem 1.15rem 1rem 1.25rem;
            background:
                linear-gradient(
                    135deg,
                    color-mix(in srgb, var(--color-primary) 10%, transparent),
                    transparent 58%
                ),
                radial-gradient(
                    circle at 92% 24%,
                    color-mix(in srgb, var(--color-primary) 12%, transparent),
                    transparent 42%
                ),
                var(--color-panel);
        }

        .discovery-hero-content,
        .discovery-hero-thumb {
            position: relative;
            z-index: 1;
        }

        .discovery-hero-content {
            flex: 1 1 auto;
            min-width: 0;
        }

        .discovery-hero-title {
            margin: 0 0 0.35rem;
            color: var(--color-text);
            font-size: 1.02rem;
            font-weight: 600;
            letter-spacing: 0;
        }

        .discovery-hero-desc {
            margin: 0 0 0.75rem;
            color: var(--color-text);
            font-size: 0.86rem;
            line-height: 1.42;
            max-width: 38ch;
        }

        .discovery-cta-link,
        .discovery-undismiss-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            cursor: pointer;
            transition:
                background-color 0.2s ease,
                border-color 0.2s ease,
                color 0.2s ease,
                transform 0.2s ease;
        }

        .discovery-hero-thumb {
            flex: 0 0 112px;
            width: 112px;
            height: 86px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .discovery-hero-thumb img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 12px 18px rgba(0, 0, 0, 0.12));
        }

        .discovery-hero-icon {
            font-size: 3rem;
            color: var(--color-highlight-dark);
        }

        .discovery-features {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 0.75rem;
        }

        .discovery-feature-card {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            min-height: 142px;
            padding: 0.82rem 0.9rem;
            background:
                linear-gradient(
                    180deg,
                    color-mix(in srgb, var(--color-primary) 4%, transparent),
                    transparent 38%
                ),
                var(--color-panel);
        }

        .discovery-feature-head {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 0.62rem;
            width: 100%;
            min-width: 0;
        }

        .discovery-feature-thumb {
            flex: 0 0 auto;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            overflow: hidden;
            background: color-mix(in srgb, var(--color-primary) 10%, transparent);
            box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--color-primary) 10%, transparent);
        }

        .discovery-feature-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .discovery-feature-icon {
            font-size: 1.45rem;
            color: var(--color-highlight-dark);
        }

        .discovery-feature-title {
            margin: 0;
            flex: 1 1 auto;
            min-width: 0;
            color: var(--color-text);
            font-size: 0.88rem;
            font-weight: 600;
            line-height: 1.25;
        }

        .discovery-feature-desc {
            margin: 0.42rem 0 0;
            padding-bottom: 0.6rem;
            color: var(--color-text);
            font-size: 0.77rem;
            line-height: 1.34;
        }

        .discovery-feature-card > .btn {
            margin-top: auto;
            min-height: 36px;
            padding: 0.44rem 0.78rem;
        }

        .discovery-feature-card > .btn .material-symbols-outlined {
            font-size: 1.15rem;
        }

        .discovery-cli-card {
            display: flex;
            align-items: center;
            gap: 1.1rem;
            min-height: 134px;
            overflow: hidden;
            padding: 1rem 1.15rem 1rem 1.25rem;
            background:
                linear-gradient(
                    135deg,
                    color-mix(in srgb, var(--color-primary) 12%, transparent),
                    transparent 52%
                ),
                radial-gradient(
                    circle at 86% 18%,
                    color-mix(in srgb, #00b7ff 14%, transparent),
                    transparent 34%
                ),
                var(--color-panel);
        }

        .discovery-cli-content {
            flex: 1 1 auto;
            min-width: 0;
        }

        .discovery-cli-kicker {
            display: inline-flex;
            width: max-content;
            margin-bottom: 0.3rem;
            border: 1px solid color-mix(in srgb, var(--color-primary) 34%, var(--color-border));
            border-radius: 999px;
            padding: 0.16rem 0.48rem;
            color: color-mix(in srgb, var(--color-primary) 72%, white 20%);
            font-size: 0.68rem;
            font-weight: 700;
            line-height: 1;
            text-transform: uppercase;
        }

        .discovery-cli-title {
            margin: 0 0 0.28rem;
            color: var(--color-text);
            font-size: 1.02rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .discovery-cli-desc {
            max-width: 62ch;
            margin: 0 0 0.65rem;
            color: var(--color-secondary);
            font-size: 0.8rem;
            line-height: 1.38;
        }

        .discovery-cli-commands {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.55rem;
            max-width: 790px;
        }

        .discovery-cli-command {
            min-width: 0;
            border: 1px solid color-mix(in srgb, var(--color-border) 82%, transparent);
            border-radius: 8px;
            background: color-mix(in srgb, #05080c 86%, var(--color-panel));
            padding: 0.48rem 0.55rem;
        }

        .discovery-cli-label {
            display: block;
            margin-bottom: 0.22rem;
            color: var(--color-secondary);
            font-size: 0.68rem;
            font-weight: 700;
            line-height: 1.1;
        }

        .discovery-cli-command code {
            display: block;
            overflow-x: auto;
            color: #72d8ff;
            font-family: var(--font-family-monospace, ui-monospace, SFMono-Regular, Consolas, monospace);
            font-size: 0.72rem;
            line-height: 1.35;
            white-space: nowrap;
        }

        .discovery-cli-preview {
            flex: 0 0 218px;
            width: 218px;
            margin: 0;
            border: 1px solid color-mix(in srgb, #00b7ff 24%, var(--color-border));
            border-radius: 8px;
            background: #070b10;
            box-shadow:
                0 12px 28px rgba(0, 0, 0, 0.2),
                0 0 28px color-mix(in srgb, var(--color-primary) 12%, transparent);
            overflow: hidden;
        }

        .discovery-cli-preview img {
            display: block;
            width: 100%;
            height: auto;
        }

        .discovery-cta-link {
            margin-top: 0.95rem;
            border: 1px solid color-mix(in srgb, var(--color-primary) 34%, var(--color-border));
            border-radius: 8px;
            background: transparent;
            color: var(--color-primary);
            padding: 0.42rem 0.72rem;
            font-size: 0.79rem;
            font-weight: 600;
        }

        .discovery-cta-link:hover,
        .discovery-cta-link:focus-visible {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: #fff;
            outline: none;
        }

        .discovery-dismiss {
            position: absolute;
            top: 0.65rem;
            right: 0.65rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--color-secondary);
            cursor: pointer;
            opacity: 0;
            transition:
                opacity 0.2s ease,
                background-color 0.2s ease,
                color 0.2s ease;
            z-index: 2;
        }

        .discovery-dismiss-small {
            top: 0.55rem;
            right: 0.55rem;
            width: 26px;
            height: 26px;
        }

        .discovery-hero:hover .discovery-dismiss,
        .discovery-hero:focus-visible .discovery-dismiss,
        .discovery-feature-card:hover .discovery-dismiss,
        .discovery-feature-card:focus-visible .discovery-dismiss {
            opacity: 0.68;
        }

        .discovery-dismiss:hover,
        .discovery-dismiss:focus-visible {
            opacity: 1;
            color: var(--color-text);
            background: color-mix(in srgb, var(--color-border) 84%, transparent);
            outline: none;
        }

        .discovery-dismiss .material-symbols-outlined {
            font-size: 1rem;
        }

        .discovery-undismiss {
            display: flex;
            justify-content: flex-start;
        }

        .discovery-undismiss-btn {
            border: none;
            background: transparent;
            padding: 0;
            color: var(--color-secondary);
            font-size: 0.8rem;
            font-weight: 500;
        }

        .discovery-undismiss-btn:hover,
        .discovery-undismiss-btn:focus-visible {
            color: var(--color-primary);
            outline: none;
        }

        .discovery-cta-link .material-symbols-outlined,
        .discovery-undismiss-btn .material-symbols-outlined {
            font-size: 1rem;
        }

        @media (hover: none) {
            .discovery-dismiss {
                opacity: 0.68;
            }
        }

        @media (max-width: 768px) {
            .discovery-section {
                gap: 0.85rem;
            }

            .discovery-hero {
                min-height: 0;
                padding: 1rem;
            }

            .discovery-hero-thumb {
                flex-basis: 92px;
                width: 92px;
                height: 76px;
            }

            .discovery-features {
                grid-template-columns: 1fr;
                gap: 0.75rem;
            }

            .discovery-feature-card {
                display: grid;
                grid-template-columns: minmax(0, 1fr) auto;
                gap: 0.75rem;
                min-height: 0;
                align-items: center;
                padding: 0.85rem 1rem;
            }

            .discovery-feature-head {
                grid-column: 1;
                min-width: 0;
            }

            .discovery-feature-thumb {
                width: 46px;
                height: 46px;
            }

            .discovery-feature-desc {
                display: none;
            }

            .discovery-feature-card > .btn {
                grid-column: 2;
                grid-row: 1;
                align-self: center;
                margin-top: 0;
            }

            .discovery-cta-link {
                margin-top: 0;
            }

            .discovery-cli-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.75rem;
                min-height: 0;
                padding: 0.95rem;
            }

            .discovery-cli-commands {
                grid-template-columns: 1fr;
                width: 100%;
                max-width: none;
            }

            .discovery-cli-preview {
                flex: 0 0 auto;
                width: min(100%, 280px);
            }
        }

        @media (max-width: 520px) {
            .discovery-slot {
                margin-top: 0.15rem;
            }

            .discovery-hero {
                padding-right: 0.95rem;
            }

            .discovery-hero-thumb {
                display: none;
            }

            .discovery-hero-title {
                font-size: 1rem;
            }

            .discovery-feature-card {
                grid-template-columns: minmax(0, 1fr) auto;
                padding-right: 3rem;
            }

            .discovery-feature-card > .btn {
                justify-self: end;
            }

            .discovery-cli-title {
                font-size: 0.98rem;
            }

            .discovery-cli-preview {
                width: 100%;
            }
        }
    </style>
</div>
